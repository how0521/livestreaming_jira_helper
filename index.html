<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>影音直播 admin 權限開通小幫手</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans TC', sans-serif;
      background: #f4f5f7;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .card {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 2px 20px rgba(0,0,0,0.08);
      padding: 36px 32px 28px;
      width: 100%;
      max-width: 460px;
    }

    .card-header {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      margin-bottom: 24px;
    }

    .card-icon {
      width: 40px;
      height: 40px;
      background: #0052cc;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .card-icon svg { width: 22px; height: 22px; fill: #fff; }

    .card-title {
      font-size: 16px;
      font-weight: 700;
      color: #172b4d;
      line-height: 1.4;
    }

    .card-subtitle { font-size: 12px; color: #6b778c; margin-top: 2px; }

    /* ---- Credentials Panel ---- */
    .cred-panel {
      background: #f8f9ff;
      border: 1.5px solid #e0e7ff;
      border-radius: 8px;
      margin-bottom: 20px;
      overflow: hidden;
    }

    .cred-toggle {
      width: 100%;
      background: none;
      border: none;
      padding: 10px 14px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      cursor: pointer;
      font-size: 12px;
      font-weight: 700;
      color: #3d4f7c;
      letter-spacing: 0.03em;
      text-transform: uppercase;
      user-select: none;
    }

    .cred-toggle:hover { background: #eef1ff; }

    .cred-toggle-right {
      display: flex;
      align-items: center;
      gap: 6px;
      font-weight: 400;
      text-transform: none;
      letter-spacing: 0;
    }

    .cred-saved-badge {
      background: #e3fcef;
      color: #006644;
      border-radius: 20px;
      padding: 1px 8px;
      font-size: 11px;
      font-weight: 600;
    }

    .cred-arrow {
      font-size: 10px;
      transition: transform 0.2s;
      color: #6b778c;
    }

    .cred-arrow.open { transform: rotate(180deg); }

    .cred-body {
      padding: 0 14px 14px;
      display: none;
    }

    .cred-body.open { display: block; }

    .cred-note {
      font-size: 11px;
      color: #6b778c;
      margin-bottom: 12px;
      line-height: 1.5;
    }

    .cred-note a { color: #0052cc; }

    /* ---- Fields ---- */
    .field { margin-bottom: 14px; }

    label {
      display: block;
      font-size: 12px;
      font-weight: 700;
      color: #172b4d;
      margin-bottom: 5px;
      letter-spacing: 0.03em;
      text-transform: uppercase;
    }

    input[type="text"],
    input[type="email"],
    input[type="password"] {
      width: 100%;
      padding: 9px 12px;
      border: 2px solid #dfe1e6;
      border-radius: 6px;
      font-size: 14px;
      color: #172b4d;
      outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
      background: #fafbfc;
    }

    input:focus {
      border-color: #0052cc;
      background: #fff;
      box-shadow: 0 0 0 2px rgba(0,82,204,0.16);
    }

    input.error { border-color: #de350b; }

    .btn-save-cred {
      width: 100%;
      padding: 8px;
      background: #0052cc;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      margin-top: 4px;
      transition: background 0.15s;
    }

    .btn-save-cred:hover { background: #0065ff; }

    /* ---- Main form fields ---- */
    .divider {
      height: 1px;
      background: #f0f1f3;
      margin: 16px 0;
    }

    .member-list { display: flex; flex-direction: column; gap: 8px; }

    .member-row { display: flex; gap: 8px; align-items: center; }

    .member-row input { flex: 1; }

    .btn-remove {
      width: 34px;
      height: 34px;
      border: 1.5px solid #dfe1e6;
      border-radius: 6px;
      background: #fff;
      cursor: pointer;
      color: #6b778c;
      font-size: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: all 0.15s;
      line-height: 1;
    }

    .btn-remove:hover { border-color: #de350b; color: #de350b; background: #fff0ed; }

    .btn-add-member {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      background: none;
      border: none;
      color: #0052cc;
      font-size: 13px;
      cursor: pointer;
      padding: 2px 0;
      margin-top: 6px;
      font-weight: 600;
    }

    .btn-add-member:hover { text-decoration: underline; }

    .btn-submit {
      width: 100%;
      padding: 11px 16px;
      background: #0052cc;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.15s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .btn-submit:hover:not(:disabled) { background: #0065ff; }
    .btn-submit:disabled { background: #b3d4ff; cursor: not-allowed; }

    .spinner {
      width: 16px;
      height: 16px;
      border: 2px solid rgba(255,255,255,0.4);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      display: none;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .status {
      margin-top: 14px;
      padding: 12px 14px;
      border-radius: 6px;
      font-size: 13px;
      line-height: 1.6;
      display: none;
    }

    .status.show { display: block; }
    .status.loading { background: #e6f0ff; color: #0052cc; }
    .status.success { background: #e3fcef; color: #006644; }
    .status.error { background: #ffebe6; color: #de350b; }

    .status a { color: inherit; font-weight: 700; word-break: break-all; }
    .status a:hover { opacity: 0.8; }
    .step { font-size: 11px; opacity: 0.65; margin-top: 3px; }
  </style>
</head>
<body>
<div class="card">
  <div class="card-header">
    <div class="card-icon">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M12 1C5.9 1 1 5.9 1 12s4.9 11 11 11 11-4.9 11-11S18.1 1 12 1zm-.5 5h1c.3 0 .5.2.5.5v1c0 .3-.2.5-.5.5h-1c-.3 0-.5-.2-.5-.5v-1c0-.3.2-.5.5-.5zm1.5 9h-2V10h2v5z"/>
      </svg>
    </div>
    <div>
      <div class="card-title">影音直播 admin 權限開通小幫手</div>
      <div class="card-subtitle">建立任務至 Jira AUTHOR 專案</div>
    </div>
  </div>

  <!-- Credentials Panel -->
  <div class="cred-panel">
    <button class="cred-toggle" type="button" onclick="toggleCred()">
      <span>Jira 連線設定</span>
      <span class="cred-toggle-right">
        <span class="cred-saved-badge" id="cred-badge" style="display:none">已儲存</span>
        <span class="cred-arrow" id="cred-arrow">▼</span>
      </span>
    </button>
    <div class="cred-body" id="cred-body">
      <p class="cred-note">
        輸入後僅儲存於本機瀏覽器 localStorage，不會上傳。<br>
        API Token 可至 <a href="https://id.atlassian.com/manage-profile/security/api-tokens" target="_blank" rel="noopener">Atlassian 帳戶設定</a> 產生。
      </p>
      <div class="field">
        <label for="cred-email">Jira Email</label>
        <input type="email" id="cred-email" placeholder="your@email.com">
      </div>
      <div class="field">
        <label for="cred-token">API Token</label>
        <input type="password" id="cred-token" placeholder="ATATT3x...">
      </div>
      <button class="btn-save-cred" type="button" onclick="saveCredentials()">儲存設定</button>
    </div>
  </div>

  <!-- Main Form -->
  <div class="field">
    <label for="appid">App ID</label>
    <input type="text" id="appid" placeholder="請輸入數字" inputmode="numeric">
  </div>

  <div class="field">
    <label>Member ID</label>
    <div class="member-list" id="member-list">
      <div class="member-row">
        <input type="text" placeholder="請輸入數字" inputmode="numeric" class="member-input">
      </div>
    </div>
    <button class="btn-add-member" type="button" onclick="addMember()">＋ 新增一筆</button>
  </div>

  <div class="divider"></div>

  <button class="btn-submit" id="submit-btn" type="button" onclick="submitForm()">
    <span class="spinner" id="spinner"></span>
    <span id="submit-label">建立 Jira 任務</span>
  </button>

  <div class="status" id="status"></div>
</div>

<script>
  const JIRA_URL = 'https://cmoney.atlassian.net';
  const PROJECT_KEY = 'AUTHOR';

  // ---- Credentials ----
  function loadCredentials() {
    return {
      email: localStorage.getItem('jira_email') || '',
      token: localStorage.getItem('jira_token') || '',
    };
  }

  function saveCredentials() {
    const email = document.getElementById('cred-email').value.trim();
    const token = document.getElementById('cred-token').value.trim();
    if (!email || !token) { alert('Email 和 API Token 都必須填寫'); return; }
    localStorage.setItem('jira_email', email);
    localStorage.setItem('jira_token', token);
    updateCredBadge(true);
    toggleCred(false);
  }

  function updateCredBadge(saved) {
    document.getElementById('cred-badge').style.display = saved ? 'inline' : 'none';
  }

  let credOpen = false;

  function toggleCred(forceOpen) {
    credOpen = forceOpen !== undefined ? forceOpen : !credOpen;
    document.getElementById('cred-body').className = 'cred-body' + (credOpen ? ' open' : '');
    document.getElementById('cred-arrow').className = 'cred-arrow' + (credOpen ? ' open' : '');
  }

  function initCredPanel() {
    const { email, token } = loadCredentials();
    if (email) document.getElementById('cred-email').value = email;
    if (token) document.getElementById('cred-token').value = token;
    const hasCred = !!(email && token);
    updateCredBadge(hasCred);
    if (!hasCred) toggleCred(true);
  }

  function getAuthHeader() {
    const { email, token } = loadCredentials();
    if (!email || !token) return null;
    return 'Basic ' + btoa(unescape(encodeURIComponent(email + ':' + token)));
  }

  // ---- Member rows ----
  function addMember() {
    const list = document.getElementById('member-list');
    const row = document.createElement('div');
    row.className = 'member-row';
    row.innerHTML = `
      <input type="text" placeholder="請輸入數字" inputmode="numeric" class="member-input">
      <button class="btn-remove" type="button" onclick="this.parentElement.remove()" title="移除">×</button>
    `;
    list.appendChild(row);
    row.querySelector('input').focus();
  }

  // ---- Status ----
  function setStatus(type, html, step) {
    const el = document.getElementById('status');
    el.className = 'status show ' + type;
    el.innerHTML = html + (step ? '<div class="step">' + step + '</div>' : '');
  }

  function clearStatus() {
    const el = document.getElementById('status');
    el.className = 'status';
    el.innerHTML = '';
  }

  function setLoading(on) {
    document.getElementById('submit-btn').disabled = on;
    document.getElementById('spinner').style.display = on ? 'block' : 'none';
    document.getElementById('submit-label').textContent = on ? '建立中...' : '建立 Jira 任務';
  }

  // ---- Jira API ----
  async function jiraFetch(method, path, body) {
    const auth = getAuthHeader();
    if (!auth) throw new Error('尚未設定 Jira 連線，請展開上方「Jira 連線設定」填入 Email 和 API Token');

    const opts = {
      method,
      headers: { 'Authorization': auth, 'Accept': 'application/json', 'Content-Type': 'application/json' },
    };
    if (body) opts.body = JSON.stringify(body);

    const res = await fetch(JIRA_URL + '/rest/api/3' + path, opts);
    if (!res.ok) {
      let msg = 'HTTP ' + res.status;
      try {
        const err = await res.json();
        if (err.errorMessages && err.errorMessages.length) msg = err.errorMessages.join('; ');
        else if (err.errors) msg = Object.values(err.errors).join('; ');
      } catch (_) {}
      throw new Error(msg);
    }
    return res.json();
  }

  // ---- Submit ----
  async function submitForm() {
    clearStatus();

    const appidEl = document.getElementById('appid');
    const appid = appidEl.value.trim();
    const memberInputs = document.querySelectorAll('.member-input');
    const memberIds = Array.from(memberInputs).map(i => i.value.trim()).filter(Boolean);

    appidEl.classList.remove('error');
    if (!appid) {
      appidEl.classList.add('error');
      setStatus('error', 'App ID 不能為空');
      appidEl.focus();
      return;
    }
    if (!/^\d+$/.test(appid)) {
      appidEl.classList.add('error');
      setStatus('error', 'App ID 只能填數字');
      return;
    }
    if (memberIds.length === 0) {
      setStatus('error', '至少填一個 Member ID');
      return;
    }
    const badMember = memberIds.find(id => !/^\d+$/.test(id));
    if (badMember) {
      setStatus('error', 'Member ID「' + badMember + '」含非數字字元');
      return;
    }

    setLoading(true);

    try {
      setStatus('loading', '連線中...', '取得專案 components');
      const project = await jiraFetch('GET', '/project/' + PROJECT_KEY);
      const components = project.components || [];
      const compIds = [];
      const backComp = components.find(c => c.name.toLowerCase() === 'back-end');
      const overseasComp = components.find(c => c.name.toLowerCase() === 'overseas');
      if (backComp) compIds.push({ id: backComp.id });
      if (overseasComp) compIds.push({ id: overseasComp.id });

      setStatus('loading', '連線中...', '搜尋受託人帳號');
      const users = await jiraFetch('GET', '/user/search?query=Maxence_Yang&maxResults=10');
      const assignee = users.find(u =>
        (u.displayName && u.displayName.includes('楊竣安')) ||
        (u.displayName && u.displayName.toLowerCase().includes('maxence'))
      ) || users[0];
      if (!assignee) throw new Error('找不到受託人 Maxence_Yang，請確認 Jira 帳號名稱');

      setStatus('loading', '連線中...', '建立 Jira 任務');
      const result = await jiraFetch('POST', '/issue', {
        fields: {
          project: { key: PROJECT_KEY },
          summary: '【' + appid + '】影音直播admin全線開通',
          issuetype: { name: 'Task' },
          assignee: { accountId: assignee.accountId },
          components: compIds,
          description: {
            type: 'doc',
            version: 1,
            content: [
              { type: 'paragraph', content: [{ type: 'text', text: 'AppID：' + appid }] },
              { type: 'paragraph', content: [{ type: 'text', text: 'Member ID：' + memberIds.join('、') }] },
            ]
          }
        }
      });

      const issueUrl = JIRA_URL + '/browse/' + result.key;
      setStatus('success', '✓ 任務建立成功！<br><a href="' + issueUrl + '" target="_blank" rel="noopener">' + result.key + ' — 點此在 Jira 開啟 ↗</a>');
    } catch (err) {
      setStatus('error', '建立失敗：' + err.message);
    } finally {
      setLoading(false);
    }
  }

  // Block non-numeric input
  document.addEventListener('input', function(e) {
    if (e.target.id === 'appid' || e.target.classList.contains('member-input')) {
      e.target.value = e.target.value.replace(/\D/g, '');
    }
  });

  // Enter to submit
  document.addEventListener('keydown', function(e) {
    if (e.key === 'Enter' && !document.getElementById('submit-btn').disabled) {
      submitForm();
    }
  });

  initCredPanel();
</script>
</body>
</html>
